# DAPPSNAP demo: Aave v3 lending protocol
# Proves generalizability — different protocol, different UI, same pipeline.
# walletAction: none for Mac Air testing. Switch to 'connect' for MetaMask flows.

baseUrl: https://app.aave.com
viewport:
  width: 1920
  height: 1080
walletAction: none

flows:
  - name: aave-markets
    path: /
    description: Browse Aave v3 markets overview showing supply/borrow rates across assets
    waitForSelector: body
    duration: 12
    actions:
      - type: wait
        duration: 4
      - type: screenshot
        name: markets-loaded
      - type: scroll
        direction: down
        amount: 600
        delay: 2
      - type: screenshot
        name: markets-scrolled
      - type: scroll
        direction: down
        amount: 600
        delay: 2

  - name: aave-governance
    path: /governance
    description: Navigate to Aave governance page showing active proposals
    waitForSelector: body
    duration: 10
    actions:
      - type: wait
        duration: 3
      - type: scroll
        direction: down
        amount: 400
        delay: 2
      - type: screenshot
        name: governance-proposals
      - type: scroll
        direction: down
        amount: 400
        delay: 2

  - name: aave-staking
    path: /staking
    description: View Aave staking interface showing AAVE and GHO staking options
    waitForSelector: body
    duration: 8
    actions:
      - type: wait
        duration: 3
      - type: screenshot
        name: staking-overview
      - type: scroll
        direction: down
        amount: 300
        delay: 2
